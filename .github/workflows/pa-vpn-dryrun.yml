---
# ─────────────────────────────────────────────────────────────────────────────
# Palo Alto VPN — Dry Run (--check --diff)
#
# Triggered automatically when palo-alto-vpn-ansible/** files change on main,
# or manually via workflow_dispatch.
#
# Runs on a SELF-HOSTED runner tagged [self-hosted, network-lab] that has
# HTTPS reachability to pa-fw01 (PAN-OS XML API on port 443).
#
# No config is pushed to the firewall — Ansible check mode only.
# Requires: ANSIBLE_VAULT_PASS secret in GitHub repo settings.
# Requires: pip install pan-os-python on the self-hosted runner.
# ─────────────────────────────────────────────────────────────────────────────
name: Palo Alto VPN — Dry Run

on:
  push:
    branches: [main]
    paths:
      - "palo-alto-vpn-ansible/**"
  workflow_dispatch:

jobs:
  dryrun:
    name: "pa-vpn — --check --diff"
    runs-on: [self-hosted, network-lab]

    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-core + Palo Alto Python SDK
        run: pip install --quiet ansible-core pan-os-python

      - name: Install Palo Alto collection
        working-directory: palo-alto-vpn-ansible
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > /tmp/.vault_pass

      - name: Dry run — palo-alto-vpn-ansible
        working-directory: palo-alto-vpn-ansible
        run: |
          ansible-playbook deploy_pa_vpn.yml \
            --check --diff \
            --vault-password-file /tmp/.vault_pass

      - name: Remove vault password file
        if: always()
        run: rm -f /tmp/.vault_pass
